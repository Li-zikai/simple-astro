{{- if .Values.ingress.enabled }}
{{- $root := . }}
{{- $tlsSecrets := .Values.ingress.tlsSecrets | default (list) }}
{{- if and (eq (len $tlsSecrets) 0) .Values.ingress.tlsSecret }}
{{- $tlsSecrets = list .Values.ingress.tlsSecret }}
{{- end }}
{{- range $index, $secret := $tlsSecrets }}
{{- if $secret.create }}
{{- $certFile := required (printf "ingress.tlsSecrets[%d].certFile is required when create=true" $index) $secret.certFile }}
{{- $keyFile := required (printf "ingress.tlsSecrets[%d].keyFile is required when create=true" $index) $secret.keyFile }}
{{- $certContent := $root.Files.Get $certFile }}
{{- $keyContent := $root.Files.Get $keyFile }}
{{- if eq $certContent "" }}
{{- fail (printf "certificate file is empty or not found: %s" $certFile) }}
{{- end }}
{{- if eq $keyContent "" }}
{{- fail (printf "key file is empty or not found: %s" $keyFile) }}
{{- end }}
---
apiVersion: v1
kind: Secret
metadata:
  name: {{ required (printf "ingress.tlsSecrets[%d].name is required when create=true" $index) $secret.name }}
  labels:
    {{- include "gamemac.labels" $root | nindent 4 }}
type: kubernetes.io/tls
stringData:
  tls.crt: |-
{{- $certContent | nindent 4 }}
  tls.key: |-
{{- $keyContent | nindent 4 }}

{{ end }}
{{ end }}
{{ end }}
