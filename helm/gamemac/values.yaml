replicaCount: 2

image:
  repository: gamesirnanjing.asuscomm.com:5000/gamehub/gamemac
  tag: "1.1.0"
  pullPolicy: Always

service:
  type: NodePort
  port: 80
  targetPort: 80
  nodePort: 30080

ingress:
  enabled: true
  className: alb
  annotations:
    alb.ingress.kubernetes.io/scheme: internet-facing
    alb.ingress.kubernetes.io/healthcheck-enabled: "true"
    alb.ingress.kubernetes.io/healthcheck-httpcode: http_2xx
    alb.ingress.kubernetes.io/healthcheck-interval-seconds: "5"
    alb.ingress.kubernetes.io/healthcheck-method: HEAD
    alb.ingress.kubernetes.io/healthcheck-path: /
    alb.ingress.kubernetes.io/healthcheck-protocol: HTTP
    alb.ingress.kubernetes.io/healthcheck-timeout-seconds: "8"
    alb.ingress.kubernetes.io/healthy-threshold-count: "3"
    alb.ingress.kubernetes.io/sticky-session: "true"
    alb.ingress.kubernetes.io/sticky-session-type: Insert
    alb.ingress.kubernetes.io/unhealthy-threshold-count: "3"
    alb.ingress.kubernetes.io/listen-ports: '[{"HTTPS":443}]'
    alb.ingress.kubernetes.io/ssl-redirect: "true"
  tls:
    - secretName: gamemac-com-tls
      hosts:
        - www.gamemac.com
        - gamemac.com
    - secretName: gamemac-cn-tls
      hosts:
        - www.gamemac.cn
        - gamemac.cn
  tlsSecrets:
    - create: true
      name: gamemac-com-tls
      certFile: cert/gamemac.com.pem
      keyFile: cert/gamemac.com.key
    - create: true
      name: gamemac-cn-tls
      certFile: cert/gamemac.cn.pem
      keyFile: cert/gamemac.cn.key
  hosts:
    - host: www.gamemac.com
      paths:
        - path: /
          pathType: Prefix
    - host: gamemac.com
      paths:
        - path: /
          pathType: Prefix
    - host: www.gamemac.cn
      paths:
        - path: /
          pathType: Prefix
    - host: gamemac.cn
      paths:
        - path: /
          pathType: Prefix

resources:
  limits:
    cpu: 200m
    memory: 512Mi
  requests:
    cpu: 100m
    memory: 128Mi

nodeSelector: {}
tolerations: []
affinity: {}

